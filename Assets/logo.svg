<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52">
  <!-- Stamp square background -->
  <rect x="2" y="2" width="48" height="48" rx="6" ry="6" fill="#E11D2E"/>
  <!-- Inner stamp border -->
  <rect x="6" y="6" width="40" height="40" rx="3" ry="3" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Letter P -->
  <text x="26" y="37" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="30" fill="white" text-anchor="middle">P</text>
  <!-- "Print" text -->
  <text x="64" y="34" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="22" fill="#1a1a1a">Print</text>
  <!-- "Express" text -->
  <text x="118" y="34" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="22" fill="#E11D2E">Express</text>
</svg>
